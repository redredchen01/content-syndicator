<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多渠道外鏈分發系統 - 儀表板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .nav-link.active { @apply bg-blue-50 text-blue-600 border-r-4 border-blue-600; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-md flex-shrink-0 flex flex-col">
    <div class="p-6 border-b">
      <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
        <i class="fas fa-robot text-blue-600"></i> Syndicator
      </h1>
      <p class="text-xs text-gray-500 mt-1">v0.2 第三方口吻分發</p>
    </div>
    <nav class="flex-1 mt-4">
      <a href="#" onclick="showView('publish')" id="nav-publish" class="nav-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
        <i class="fas fa-paper-plane w-5"></i> <span class="ml-3">文章發佈</span>
      </a>
      <a href="#" onclick="showView('brand')" id="nav-brand" class="nav-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
        <i class="fas fa-id-card w-5"></i> <span class="ml-3">品牌資料庫</span>
      </a>
      <a href="#" onclick="showView('history')" id="nav-history" class="nav-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
        <i class="fas fa-history w-5"></i> <span class="ml-3">發佈歷史</span>
      </a>
      <a href="#" onclick="showView('settings')" id="nav-settings" class="nav-link flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors">
        <i class="fas fa-cog w-5"></i> <span class="ml-3">系統設置</span>
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col min-w-0">
    <header class="bg-white shadow-sm p-4 flex justify-between items-center">
      <h2 id="view-title" class="text-lg font-semibold text-gray-700">文章發佈</h2>
      <div id="top-dispatch-badge" class="hidden px-3 py-1 rounded-full text-xs font-medium"></div>
    </header>

    <div class="flex-1 overflow-y-auto p-6">
      
      <!-- VIEW: Publish -->
      <section id="view-publish" class="view-content hidden space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
          <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">文章來源 URL</label>
              <div class="flex gap-2">
                <input type="text" id="sourceUrl" placeholder="https://..." class="flex-1 border rounded-md px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500">
                <button id="scrapeBtn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">抓取並重寫</button>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-4">
              <input type="text" id="editTitle" placeholder="標題" class="w-full border rounded-md px-3 py-2 outline-none">
              <textarea id="editContent" rows="12" placeholder="Markdown 正文..." class="w-full border rounded-md px-3 py-2 font-mono text-sm outline-none" oninput="updatePreview()"></textarea>
              <div class="grid grid-cols-2 gap-4">
                <input type="text" id="editTags" placeholder="標籤 (逗號分隔)" class="w-full border rounded-md px-3 py-2 outline-none">
                <input type="text" id="editExcerpt" placeholder="摘要" class="w-full border rounded-md px-3 py-2 outline-none">
              </div>
            </div>
            <div class="space-y-6">
              <div id="preview" class="border rounded-md p-4 bg-gray-50 h-[350px] overflow-y-auto prose prose-sm max-w-none">预览区</div>
              <div class="bg-blue-50 p-4 rounded-lg">
                <div id="platforms-list" class="flex flex-wrap gap-2 mb-4"></div>
                <div class="flex items-center justify-between">
                  <div class="flex gap-4 text-sm">
                    <label><input type="radio" name="pubStatus" value="draft" checked> 草稿</label>
                    <label><input type="radio" name="pubStatus" value="public"> 公開</label>
                  </div>
                  <button id="finalPublishBtn" class="bg-green-600 text-white px-6 py-2 rounded-md font-bold hover:bg-green-700 shadow-md">立即分發發佈</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- VIEW: Brand -->
      <section id="view-brand" class="view-content hidden space-y-6">
        <div class="bg-white p-6 rounded-xl border">
          <form id="brand-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium mb-1">品牌主名稱 *</label>
              <input id="brand-name" type="text" required class="w-full border rounded-md px-3 py-2 outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">目標 URL 清單 (每行: URL 標籤)</label>
              <textarea id="brand-target-urls" rows="5" class="w-full border rounded-md px-3 py-2 text-sm font-mono"></textarea>
            </div>
            <button type="submit" class="bg-blue-600 text-white px-8 py-2 rounded-md">保存設定</button>
          </form>
        </div>
      </section>

      <!-- VIEW: History -->
      <section id="view-history" class="view-content hidden space-y-4">
        <div id="history-list" class="space-y-4"></div>
      </section>

      <!-- VIEW: Settings -->
      <section id="view-settings" class="view-content hidden">
        <div id="settings-form" class="bg-white p-6 rounded-xl border grid grid-cols-1 md:grid-cols-2 gap-4 font-mono text-sm"></div>
      </section>

    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function showView(viewId) {
      document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      $(`view-${viewId}`).classList.remove('hidden');
      $(`nav-${viewId}`).classList.add('active');
      if (viewId === 'brand') loadBrandProfile();
      if (viewId === 'history') loadHistory();
      if (viewId === 'settings') loadSettings();
      if (viewId === 'publish') loadPlatforms();
    }

    function updatePreview() {
      const content = $('editContent').value || '';
      $('preview').innerHTML = content ? marked.parse(content) : '<p class="text-gray-400">尚未輸入內容...</p>';
    }

    async function loadPlatforms() {
      try {
        const res = await fetch('/api/platforms');
        const data = await res.json();
        $('platforms-list').innerHTML = data.platforms.map(p => {
          const connected = p.connected ? 'border-green-500 bg-green-50' : 'border-gray-200 opacity-50';
          const checked = data.defaults.includes(p.name) ? 'checked' : '';
          return `<label class="flex items-center gap-2 border px-2 py-1 rounded text-xs cursor-pointer ${connected}"><input type="checkbox" name="platforms" value="${p.name}" ${checked}> ${p.name}</label>`;
        }).join('');
      } catch (e) {}
    }

    $('scrapeBtn').onclick = async () => {
      const url = $('sourceUrl').value.trim();
      if (!url) return alert('請輸入 URL');
      $('scrapeBtn').disabled = true;
      $('scrapeBtn').textContent = '處理中...';
      try {
        const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        $('editTitle').value = data.title;
        $('editContent').value = data.content;
        $('editTags').value = (data.tags || []).join(', ');
        $('editExcerpt').value = data.excerpt || '';
        updatePreview();
      } catch (e) { alert('生成失敗: ' + e.message); }
      finally { $('scrapeBtn').disabled = false; $('scrapeBtn').textContent = '抓取並重寫'; }
    };

    $('finalPublishBtn').onclick = async () => {
      const title = $('editTitle').value.trim();
      const content = $('editContent').value.trim();
      const platforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(i => i.value);
      if (!title || !content || platforms.length === 0) return alert('請完整填寫並選擇平台');

      $('finalPublishBtn').disabled = true;
      $('finalPublishBtn').textContent = '啟動中...';
      
      try {
        const res = await fetch('/api/publish', { 
          method: 'POST', headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ 
            title, content, platforms, 
            tags: $('editTags').value.split(',').filter(Boolean),
            excerpt: $('editExcerpt').value,
            publishStatus: document.querySelector('input[name="pubStatus"]:checked').value,
            url: $('sourceUrl').value || 'manual' 
          }) 
        });
        const result = await res.json();
        if (result.success && result.batchId) { showView('history'); trackBatchProgress(result.batchId); }
        else { alert('啟動失敗: ' + (result.error || '未知錯誤')); }
      } catch (e) { alert('網絡錯誤: ' + e.message); }
      finally { $('finalPublishBtn').disabled = false; $('finalPublishBtn').textContent = '立即分發發佈'; }
    };

    const activeTrackers = new Set();
    function trackBatchProgress(batchId) {
      if (activeTrackers.has(batchId)) return;
      activeTrackers.add(batchId);
      const interval = setInterval(async () => {
        try {
          const res = await fetch(`/api/batch-status/${batchId}`);
          const data = await res.json();
          updateHistoryItemUI(batchId, data);
          if (data.isFinished) { clearInterval(interval); activeTrackers.delete(batchId); loadHistory(); }
        } catch (e) { clearInterval(interval); activeTrackers.delete(batchId); }
      }, 3000);
    }

    function updateHistoryItemUI(batchId, data) {
      const itemEl = document.querySelector(`[data-batch="${batchId}"]`);
      if (!itemEl) return;
      const bar = itemEl.querySelector('.progress-bar');
      if (bar) bar.style.width = `${data.percent}%`;
      const text = itemEl.querySelector('.progress-text');
      if (text) text.textContent = data.isFinished ? '分發完成' : `進度: ${data.completed}/${data.total}`;
    }

    async function loadBrandProfile() {
      try {
        const res = await fetch('/api/v2/brand-profile');
        const data = await res.json();
        const badge = $('top-dispatch-badge');
        badge.className = `px-3 py-1 rounded-full text-xs font-medium block ${data.dispatchReady ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`;
        badge.textContent = data.dispatchReady ? '✓ 品牌資料已就緒' : '⚠ 品牌資料不完整';
        if (data.profile) {
          $('brand-name').value = data.profile.name;
          $('brand-target-urls').value = (data.profile.target_urls || []).map(t => `${t.url} ${t.context_tag}`).join('\n');
        }
      } catch (e) {}
    }

    $('brand-form').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        name: $('brand-name').value.trim(),
        target_urls: $('brand-target-urls').value.split('\n').filter(Boolean).map(line => {
          const [url, ...tags] = line.trim().split(/\s+/);
          return { url, context_tag: tags.join(' ') };
        }),
        exposure_blocklist: [], name_variants: [], anchor_blocklist: []
      };
      const res = await fetch('/api/v2/brand-profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (res.ok) { alert('保存成功'); loadBrandProfile(); }
    };

    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        if (data.length === 0) { $('history-list').innerHTML = '<div class="text-center py-10 text-gray-400">暫無記錄</div>'; return; }
        $('history-list').innerHTML = data.map(item => `
          <div class="bg-white p-4 rounded-lg shadow-sm border" data-batch="${item.batch_id || ''}">
            <div class="flex justify-between items-start mb-2">
              <h4 class="font-bold text-gray-800">${item.title}</h4>
              <span class="text-[10px] text-gray-400">${new Date(item.created_at).toLocaleString()}</span>
            </div>
            <div class="text-[10px] text-gray-500 mb-3 truncate">${item.original_url}</div>
            ${item.batch_id ? `<div class="mb-2"><div class="w-full bg-gray-100 rounded-full h-1"><div class="progress-bar bg-blue-500 h-1 rounded-full w-0"></div></div><div class="progress-text text-[9px] text-blue-500 mt-1">同步中...</div></div>` : ''}
            <div class="flex flex-wrap gap-2">
              ${JSON.parse(item.results || '[]').map(r => `<a href="${r.publishedUrl || '#'}" target="_blank" class="text-[10px] px-2 py-0.5 rounded border ${r.success ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}">${r.platform}</a>`).join('')}
            </div>
          </div>
        `).join('');
        data.forEach(item => { if (item.batch_id) trackBatchProgress(item.batch_id); });
      } catch (e) {}
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        let html = '';
        for (const [key, val] of Object.entries(data)) {
          if (key !== 'AUTH_STATUS') html += `<div class="p-2 border rounded"><strong>${key}:</strong> <span class="text-gray-500">${val}</span></div>`;
        }
        $('settings-form').innerHTML = html;
      } catch (e) {}
    }

    window.onload = () => showView('publish');
  </script>
</body>
</html>
